  <div id="recPopup" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded-lg">
      <h2 class="font-bold mb-3">Your Recommendations</h2>
      <p id="recText"></p>
      <button onclick="closePopup()" class="mt-3 px-4 py-2 bg-blue-500 text-white rounded">Close</button>

  <script src="script.js"></script>
   <script>
const kidId = localStorage.getItem("kid_id");

// ✅ safe parsing
const age = parseInt(localStorage.getItem("age")) || 6;
const favoriteFood = JSON.parse(localStorage.getItem("favorite_food") || "[]");

function showPopup(items) {
    const popup = document.getElementById("recPopup");
    const recText = document.getElementById("recText");

    // ✅ FIX: handle undefined/null safely
    if (!items || items.length === 0) {
        recText.textContent = "No recommendations found 😅";
    } else {
        recText.textContent = items.join(", ");
    }

    popup.classList.remove("hidden");
}

function closePopup() {
    document.getElementById("recPopup").classList.add("hidden");
}

async function fetchRecommendation(time_of_day) {

    console.log("Sending:", {
        kid_id: kidId,
        age_group: age,
        favorite_food: favoriteFood,
        time_of_day: time_of_day
    });

    try {
        const response = await fetch("/api/recommend", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                kid_id: kidId,
                age_group: age,
                favorite_food: favoriteFood,
                time_of_day: time_of_day
            })
        });

        if (!response.ok) {
            console.error("API Error");
            showPopup([]);
            return;
        }

        const data = await response.json();
        console.log("Received:", data);

        // ✅ FIX: ALWAYS ensure array
        let list = [];

        if (Array.isArray(data)) {
            list = data;
        } else if (data && Array.isArray(data.data)) {
            list = data.data;
        } else {
            console.warn("Unexpected format:", data);
            showPopup([]);
            return;
        }

        // ✅ Extract names safely
        const foodNames = list.map(item =>
            item?.name || item?.food_name || "Unknown Food"
        );

        console.log("Names:", foodNames);

        showPopup(foodNames);

    } catch (error) {
        console.error("Fetch failed:", error);
        showPopup([]);
    }
}

// ✅ attach events safely (after DOM loads)
document.addEventListener("DOMContentLoaded", () => {
    document.querySelector(".r_snack")
        .addEventListener("click", () => fetchRecommendation("Snack"));

    document.querySelector(".r_lunch")
        .addEventListener("click", () => fetchRecommendation("Lunch"));
});
</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
