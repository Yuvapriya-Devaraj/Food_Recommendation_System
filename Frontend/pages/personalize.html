<body class="bg-slate-100 flex justify-center">

  <!-- APP CONTAINER -->
  <div class="w-[390px] min-h-screen bg-[#FEFFB3] px-4 py-5 relative">

    <!-- TOP BAR -->
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-family-fredoka font-bold text-green-600">
        KiddosFood 🥗
      </h1>
      <!--
      <div class="flex gap-3 text-2xl">
        <a href="profile.html" class="active:scale-90 transition">👤</a>
        <a href="help.html" class="active:scale-90 transition">❔</a>
        <a href="settings.html" class="active:scale-90 transition">⚙️</a>
      </div>-->
    </div>
    
    <!-- FRUIT CHARACTER -->
    <div class="flex my-6 gap-3">
<div class="relative justify-center bg-red-600 text-right rounded-3xl w-full h-[48px] text-white text-[32px] font-semibold font-fredoka" style="font-family:'Fredoka',sans-serif;">
  <!-- Strawberry (parent) -->
  <div class="absolute text-7xl font align-left -bottom-1">

    🍓

    <!-- Eyes (child, positioned ON the fruit) -->
    <div class="absolute top-5 left-1/2 -translate-x-1/2 text-2xl">
      👀
    </div>
  </div> 
  
  <p>Tell about you...</p>
  </div>
</div>
 <form id="kidForm" class="space-y-5">

      <!-- Kid Name -->
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700">
          Kid Name (optional)
        </label>
        <input
          id="name"
          type="text"
          placeholder="Enter name"
          class="w-full px-4 py-2 border rounded-lg bg-gray-50
                 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <!-- Nickname -->
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700">
          Nickname ⭐
        </label>
        <input
          id="nickname"
          type="text"
          placeholder="What should we call you?"
          required
          class="w-full px-4 py-2 border rounded-lg bg-gray-50
                 focus:bg-white focus:outline-none focus:ring-2 focus:ring-purple-400"
        />
      </div>

      <!-- Age Group -->
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700">
          Age Group 🎂
        </label>
        <select
          id="age"
          required
          class="w-full px-4 py-2 border rounded-lg bg-gray-50
                 focus:bg-white focus:outline-none focus:ring-2 focus:ring-pink-400"
        >
          <option value="">Select age group</option>
          <option value="3">3 – 5 years</option>
          <option value="6">6 – 9 years</option>
          <option value="10">10 – 12 years</option>
        </select>
      </div>

      <!-- Favorite Food -->
      <div>
        <label class="block text-sm font-medium mb-2 text-gray-700">
          Favorite Food 🍕
        </label>

        <div class="grid grid-cols-2 gap-3">
          <label class="flex items-center gap-2 p-2 rounded-lg bg-blue-50 hover:bg-blue-100 cursor-pointer">
            <input type="checkbox" value="fruits" class="accent-blue-500">
            Fruits 🍎
          </label>

          <label class="flex items-center gap-2 p-2 rounded-lg bg-green-50 hover:bg-green-100 cursor-pointer">
              <input type="checkbox" value="vegetables" class="accent-green-500">
              Vegetables 🥦
          </label>

          <label class="flex items-center gap-2 p-2 rounded-lg bg-yellow-50 hover:bg-yellow-100 cursor-pointer">
            <input type="checkbox" value="snacks" class="accent-yellow-500">
            Snacks 🍪
          </label>

      
        </div>
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-blue-500 text-white py-3 rounded-lg font-semibold
               hover:bg-blue-600 active:scale-95 transition"
      >
        Save Profile
      </button>

    </form>
    <script>
      
document.getElementById("kidForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const nickname = document.getElementById("nickname").value;
    const ageGroup = document.getElementById("age").value;

    const favoriteFood = Array.from(
        document.querySelectorAll('input[type="checkbox"]:checked')
    ).map(cb => cb.value);

    const kidId = "KID_" + Date.now();

    const response = await fetch("/save_profile", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            kid_id: kidId,
            name: name,
            nickname: nickname,
            age_group: ageGroup,
            favorite_food: favoriteFood
        })
    });

    const data = await response.json();

    if (data.status === "success") {
        localStorage.setItem("kid_id", kidId);
        window.location.href = "/select";
    } else {
        alert(data.message);
    }
});
</script>



  </div>
</body>
</html>
